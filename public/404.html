<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Not Found | Risal Labs</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            font-family: var(--font-mono);
        }
        .error-code {
            font-size: 8rem;
            color: var(--primary);
            margin-bottom: 1rem;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1 class="error-code">404</h1>
        <h2>[ERR_NOT_FOUND]</h2>
        <p class="mono" style="margin: 2rem 0; color: var(--text-muted);">> The requested path does not exist on this server.</p>
        <a href="/" class="mono highlight-secondary">> RETURN TO INDEX</a>
    </div>
</body>
</html>
